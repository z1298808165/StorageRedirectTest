name: A17

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: A17-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_API_LEVEL: 36
  ANDROID_TARGET: google_apis
  ANDROID_ARCH: x86_64
  SRX_REPO: Kindness-Kismet/Storage-redirection-X-Public

jobs:
  test:
    name: Android 17 / API 37
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v4

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: 启用 KVM 权限
        run: |
          set -euo pipefail
          if [ -e /dev/kvm ]; then
            sudo sh -c 'echo KERNEL==\"kvm\", GROUP=\"kvm\", MODE=\"0666\", OPTIONS+=\"static_node=kvm\" > /etc/udev/rules.d/99-kvm4all.rules'
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
          fi

      - name: 准备脚本
        run: chmod +x ./gradlew .github/scripts/*.sh

      - name: 下载最新版 Storage Redirect X 模块
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p core
          TAG="$(gh release view --repo "$SRX_REPO" --json tagName -q .tagName)"
          gh release download "$TAG" --repo "$SRX_REPO" --pattern '*x86_64.zip' --dir core --clobber
          test -n "$(find core -maxdepth 1 -name '*x86_64.zip' -print -quit)"

      - name: 构建 APK 并运行本地测试
        run: ./gradlew --no-daemon --stacktrace :app:testDebugUnitTest :media-file-api:testDebugUnitTest :app:assembleDebug :app:assembleDebugAndroidTest :media-file-api:assembleDebugAndroidTest

      - name: 运行模拟器测试
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          target: ${{ env.ANDROID_TARGET }}
          arch: ${{ env.ANDROID_ARCH }}
          profile: pixel_7
          disk-size: 4096M
          heap-size: 1024M
          disable-animations: true
          emulator-boot-timeout: 1500
          script: |
            set -eu
            adb wait-for-device
            adb shell 'while [ "$(getprop sys.boot_completed)" != "1" ]; do sleep 2; done'
            bash .github/scripts/install-storage-redirect-module.sh
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb shell appops set me.fakerqu.test.storageredirect MANAGE_EXTERNAL_STORAGE allow || true
            bash .github/scripts/run-storage-redirect-scenarios.sh

      - name: 上传测试产物
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: A17-artifacts
          if-no-files-found: ignore
          retention-days: 14
          path: |
            core/*.zip
            scenario-*-result.txt
            media-health.txt
            app/build/outputs/apk/**/*.apk
            app/build/reports/
            app/build/outputs/androidTest-results/
            media-file-api/build/reports/
            media-file-api/build/outputs/androidTest-results/
